<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>城市碎片 · 北京</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #a8be78;
      display: flex; justify-content: center; align-items: flex-start;
      min-height: 100vh; padding: 20px 12px;
      font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
    }
    #game {
      width: 390px; max-width: 100%; background: #c8d898;
      border-radius: 24px; overflow: hidden; border: 2px solid #90ae58;
      display: flex; flex-direction: column; height: 680px; position: relative;
      box-shadow: 0 4px 20px rgba(60,90,30,0.25);
    }
    #map { height: 100%; width: 100%; }

    /* Custom building marker */
    .bld-marker { background: transparent !important; border: none !important; }
    @keyframes auraFloat {
      0%,100% { r: 22; opacity: 0.45; }
      50%      { r: 28; opacity: 0.15; }
    }
    .bld-aura { animation: auraFloat 2.5s ease-in-out infinite; }

    /* Leaflet controls themed green */
    .leaflet-control-zoom { border: 1.5px solid #90ae58 !important; border-radius: 10px !important; overflow: hidden; }
    .leaflet-control-zoom a { background: #e8f0d0 !important; color: #3a6018 !important; border-bottom-color: #90ae58 !important; font-weight: 700 !important; font-size: 16px !important; }
    .leaflet-control-zoom a:hover { background: #d0e4b8 !important; }
    .leaflet-control-attribution { font-size: 8px !important; background: rgba(232,240,208,0.85) !important; }
    .leaflet-bar { box-shadow: 0 2px 8px rgba(60,90,30,0.2) !important; }

    .tab-btn { background: none; border: none; cursor: pointer; transition: color 0.2s; }
    #detail-panel { transition: transform 0.35s cubic-bezier(0.16,1,0.3,1); }
    .action-btn {
      transition: opacity 0.15s; cursor: pointer; border: none;
      border-radius: 20px; font-size: 12px; font-weight: 600;
      padding: 11px; font-family: inherit;
    }
    .action-btn:hover { opacity: 0.82; }
    .action-btn:disabled { opacity: 0.35; cursor: not-allowed; }
    ::-webkit-scrollbar { width: 3px; }
    ::-webkit-scrollbar-thumb { background: #90ae78; border-radius: 2px; }
  </style>
</head>
<body>
<div id="game">

  <!-- HEADER -->
  <div style="padding:13px 18px;background:#b8d088;border-bottom:1.5px solid #90ae58;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;z-index:30;position:relative;">
    <div>
      <div style="color:#2a4010;font-size:17px;font-weight:800;letter-spacing:1px;">🗺 城市碎片</div>
      <div style="color:#5a8030;font-size:10px;margin-top:2px;">北京 · 胡同探索计划</div>
    </div>
    <div style="background:#e8f0d0;border-radius:16px;padding:5px 13px;border:1.5px solid #90ae58;">
      <div id="score-display" style="color:#3a6018;font-size:13px;font-weight:700;">✦ 0 / 7</div>
      <div style="color:#7aa050;font-size:9px;margin-top:1px;">碎片已收集</div>
    </div>
  </div>

  <!-- CONTENT -->
  <div style="flex:1;position:relative;overflow:hidden;">

    <!-- REAL MAP -->
    <div id="map-view" style="height:100%;position:relative;">
      <div id="map"></div>
    </div>

    <!-- COLLECTION VIEW -->
    <div id="collection-view" style="display:none;height:100%;overflow-y:auto;padding:18px;background:#d0dca8;">
      <div style="margin-bottom:16px;">
        <div style="color:#2a4010;font-size:15px;font-weight:800;margin-bottom:3px;">🗂 我的收藏册</div>
        <div id="coll-subtitle" style="color:#5a8030;font-size:11px;">收集 3 枚碎片可合成专属明信片</div>
      </div>
      <div id="collection-grid" style="display:grid;grid-template-columns:1fr 1fr;gap:10px;"></div>
      <div id="postcard-btn-section" style="margin-top:16px;display:none;">
        <button onclick="generatePostcard()" class="action-btn" style="width:100%;background:#3a6018;color:#e8f0d0;">✦ 合成我的北京明信片</button>
      </div>
      <div id="postcard-result" style="margin-top:12px;"></div>
    </div>

    <!-- DETAIL PANEL -->
    <div id="detail-panel" style="position:absolute;bottom:0;left:0;right:0;background:#e8f0d8;border-top:2px solid #90ae58;border-radius:20px 20px 0 0;padding:18px;transform:translateY(100%);z-index:1000;max-height:78%;overflow-y:auto;">
      <div style="width:32px;height:3px;background:#90ae58;border-radius:2px;margin:0 auto 14px;opacity:0.6;"></div>
      <div id="detail-content"></div>
    </div>

  </div>

  <!-- BOTTOM NAV -->
  <div style="height:58px;background:#b8d088;border-top:1.5px solid #90ae58;display:flex;align-items:stretch;flex-shrink:0;z-index:30;position:relative;">
    <button class="tab-btn" id="tab-map" onclick="switchTab('map')" style="flex:1;color:#2a4010;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;font-size:10px;font-family:inherit;border-right:1px solid #90ae58;">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M3 7l6-3 6 3 6-3v13l-6 3-6-3-6 3V7z"/><line x1="9" y1="4" x2="9" y2="17"/><line x1="15" y1="7" x2="15" y2="20"/></svg>
      探索地图
    </button>
    <button class="tab-btn" id="tab-coll" onclick="switchTab('collection')" style="flex:1;color:#6a9848;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;font-size:10px;font-family:inherit;">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
      收藏册
    </button>
  </div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script>
// ===== API =====
async function callDeepSeek(prompt) {
  const res = await fetch("/api/story", {
    method:"POST", headers:{"Content-Type":"application/json"},
    body: JSON.stringify({ prompt })
  });
  if (!res.ok) throw new Error("HTTP " + res.status);
  const data = await res.json();
  if (data.error) throw new Error(data.error);
  return data.text;
}

// ===== BUILDING ART =====
const BLDART = {
  1:`<rect x="-16" y="5" width="32" height="10" rx="2" fill="#d4b880"/>
     <rect x="-10" y="-18" width="20" height="23" rx="1" fill="#c8a870"/>
     <rect x="-6" y="-11" width="4" height="5" rx="0.5" fill="#7a5828"/>
     <rect x="2" y="-11" width="4" height="5" rx="0.5" fill="#7a5828"/>
     <polygon points="-14,-18 14,-18 10,-25 -10,-25" fill="#c86848"/>
     <polygon points="-9,-25 9,-25 5,-31 -5,-31" fill="#b05838"/>
     <polygon points="-4,-31 4,-31 1,-36 -1,-36" fill="#a04828"/>
     <line x1="0" y1="-36" x2="0" y2="-39" stroke="#c09050" stroke-width="1.5"/>
     <circle cx="0" cy="-40" r="2" fill="#d4a860"/>`,
  2:`<ellipse cx="0" cy="10" rx="23" ry="13" fill="#78ccc0"/>
     <ellipse cx="-9" cy="15" rx="5" ry="3" fill="#5aaa6a" opacity="0.7"/>
     <ellipse cx="10" cy="16" rx="4" ry="2.5" fill="#5aaa6a" opacity="0.7"/>
     <rect x="-9" y="-1" width="18" height="10" rx="2" fill="#ead8a8"/>
     <rect x="-7" y="-14" width="2" height="14" fill="#c0a060"/>
     <rect x="5" y="-14" width="2" height="14" fill="#c0a060"/>
     <polygon points="-12,-12 12,-12 0,-24" fill="#c86848"/>
     <circle cx="0" cy="-25" r="2.5" fill="#d4a860"/>`,
  3:`<rect x="-15" y="4" width="30" height="5" rx="1" fill="#b8a078"/>
     <rect x="-14" y="-10" width="6" height="14" rx="1" fill="#c8a878"/>
     <rect x="8" y="-10" width="6" height="14" rx="1" fill="#c8a878"/>
     <path d="M-8,-10 Q-8,0 0,0 Q8,0 8,-10 Z" fill="#2d1a08"/>
     <polygon points="-17,-10 17,-10 12,-19 -12,-19" fill="#c86848"/>
     <polygon points="-10,-19 10,-19 6,-25 -6,-25" fill="#b05838"/>
     <ellipse cx="-5" cy="-4" rx="2" ry="3" fill="#d04030"/>
     <line x1="-5" y1="-7" x2="-5" y2="-10" stroke="#8b3020" stroke-width="0.8"/>
     <ellipse cx="5" cy="-4" rx="2" ry="3" fill="#d04030"/>
     <line x1="5" y1="-7" x2="5" y2="-10" stroke="#8b3020" stroke-width="0.8"/>`,
  4:`<rect x="-20" y="2" width="40" height="13" rx="2" fill="#e8c860"/>
     <rect x="-13" y="-14" width="26" height="17" rx="1" fill="#e0c050"/>
     <path d="M-22,2 Q-12,-12 0,-14 Q12,-12 22,2 Z" fill="#4a8040"/>
     <rect x="-8" y="-8" width="5" height="7" rx="0.5" fill="#9a7030" opacity="0.7"/>
     <rect x="3" y="-8" width="5" height="7" rx="0.5" fill="#9a7030" opacity="0.7"/>
     <rect x="-4" y="15" width="8" height="5" rx="1" fill="#a89050"/>
     <rect x="-2" y="13" width="4" height="4" rx="0.5" fill="#b8a060"/>
     <line x1="-20" y1="2" x2="20" y2="2" stroke="#c09050" stroke-width="0.8"/>`,
  5:`<ellipse cx="0" cy="12" rx="21" ry="10" fill="#78ccc0"/>
     <ellipse cx="0" cy="7" rx="15" ry="6" fill="#9aba7a"/>
     <rect x="-10" y="-2" width="20" height="8" rx="2" fill="#f0ead8"/>
     <ellipse cx="0" cy="-9" rx="8" ry="8" fill="#f5f0e8"/>
     <polygon points="-2,-16 2,-16 0.5,-27 -0.5,-27" fill="#ece8d8"/>
     <line x1="0" y1="-27" x2="0" y2="-31" stroke="#c09050" stroke-width="1.5"/>
     <circle cx="0" cy="-32" r="2" fill="#d4a860"/>
     <rect x="-8" y="-2" width="16" height="3" rx="1" fill="#e4d8c0"/>`,
  6:`<rect x="-20" y="5" width="40" height="13" rx="1" fill="#c84030"/>
     <rect x="-13" y="-18" width="26" height="24" rx="1" fill="#d04838"/>
     <rect x="-8" y="-10" width="5" height="7" rx="0.5" fill="#8b2018" opacity="0.7"/>
     <rect x="3" y="-10" width="5" height="7" rx="0.5" fill="#8b2018" opacity="0.7"/>
     <polygon points="-19,-18 19,-18 14,-26 -14,-26" fill="#4a7840"/>
     <polygon points="-12,-26 12,-26 8,-33 -8,-33" fill="#3a6830"/>
     <polygon points="-6,-33 6,-33 3,-39 -3,-39" fill="#2a5820"/>
     <circle cx="-19" cy="-18" r="1.5" fill="#d4a060"/>
     <circle cx="19" cy="-18" r="1.5" fill="#d4a060"/>
     <line x1="0" y1="-39" x2="0" y2="-43" stroke="#c09050" stroke-width="1.5"/>
     <circle cx="0" cy="-44" r="2" fill="#d4a860"/>`,
  7:`<rect x="-16" y="-8" width="32" height="20" rx="3" fill="#f0e4c8"/>
     <polygon points="-18,-8 18,-8 14,-17 -14,-17" fill="#c86848"/>
     <rect x="7" y="-21" width="4" height="6" rx="1" fill="#b08060"/>
     <rect x="-4" y="3" width="8" height="9" rx="2" fill="#8b5030"/>
     <rect x="-13" y="-3" width="7" height="6" rx="1" fill="#c8e4f0" opacity="0.8"/>
     <rect x="6" y="-3" width="7" height="6" rx="1" fill="#c8e4f0" opacity="0.8"/>
     <rect x="-16" y="-3" width="32" height="3" fill="#d07858" opacity="0.8"/>
     <circle cx="-9" cy="1" r="2" fill="#e8607a"/>
     <circle cx="-6" cy="1" r="2" fill="#f0a060"/>`
};

// ===== FRAGMENTS with REAL GPS COORDS =====
const fragments = [
  {id:1, latlng:[39.9388,116.3957], name:"鼓楼",       type:"历史地标", challenge:"找到鼓楼飞檐最美角度，拍下那四角翘起的弧线",      collected:false, story:null},
  {id:2, latlng:[39.9412,116.3806], name:"什刹海",     type:"湖畔风情", challenge:"在荷花市场附近，捕捉水面倒映的灰瓦与红墙",          collected:false, story:null},
  {id:3, latlng:[39.9337,116.4041], name:"南锣鼓巷",   type:"胡同文化", challenge:"找一扇挂着旧门牌号的四合院木门并拍下来",             collected:false, story:null},
  {id:4, latlng:[39.9473,116.4107], name:"雍和宫",     type:"藏传佛教", challenge:"在香烟缭绕中拍下金顶与蓝天的强烈对比",              collected:false, story:null},
  {id:5, latlng:[39.9250,116.3884], name:"北海公园",   type:"皇家园林", challenge:"在五龙亭附近找到白塔倒影最完整的拍摄点",             collected:false, story:null},
  {id:6, latlng:[39.9152,116.4003], name:"故宫角楼",   type:"皇城遗迹", challenge:"从护城河东南角，拍出三重屋檐叠层的角楼剪影",         collected:false, story:null},
  {id:7, latlng:[39.9372,116.4060], name:"五道营胡同", type:"文艺街区", challenge:"找到最有年代感的一块手写木招牌留影",                  collected:false, story:null}
];

// ===== LEAFLET MAP =====
const map = L.map('map', {
  center: [39.932, 116.397],
  zoom: 14,
  zoomControl: false
});

// CartoDB Positron — free, no API key needed, clean white style
L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
  attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> © <a href="https://carto.com/">CARTO</a>',
  subdomains: 'abcd',
  maxZoom: 19
}).addTo(map);

// Zoom control (styled via CSS above)
L.control.zoom({ position: 'bottomright' }).addTo(map);

// ===== MARKERS =====
const leafletMarkers = {};

function buildMarkerHTML(f) {
  const lw = f.name.length * 8 + 14;
  const aura = !f.collected
    ? `<circle r="24" fill="#90e890" class="bld-aura" style="animation-delay:${f.id*0.32}s"/>`
    : '';
  const badge = f.collected
    ? `<circle cx="16" cy="-42" r="7" fill="#f0c830" stroke="white" stroke-width="2"/>
       <text x="16" y="-38" text-anchor="middle" fill="white" font-size="8" font-weight="700">✦</text>`
    : '';
  return `
    <svg viewBox="-26 -55 52 82" width="52" height="82"
         xmlns="http://www.w3.org/2000/svg" style="overflow:visible;display:block;">
      ${aura}
      ${BLDART[f.id]}
      ${badge}
      <rect x="${-lw/2}" y="16" width="${lw}" height="15" rx="8"
            fill="${f.collected?'#d0f0a8':'#ffffe8'}"
            stroke="${f.collected?'#5a9030':'#b8c888'}" stroke-width="1.2"/>
      <text x="0" y="27" text-anchor="middle"
            fill="${f.collected?'#2a5010':'#4a6028'}"
            font-size="8.5" font-weight="600" font-family="sans-serif">${f.name}</text>
    </svg>`;
}

function refreshMarkers() {
  fragments.forEach(f => {
    const icon = L.divIcon({
      html: buildMarkerHTML(f),
      className: 'bld-marker',
      iconSize: [52, 82],
      iconAnchor: [26, 62]  // anchor = base of building
    });
    if (leafletMarkers[f.id]) {
      leafletMarkers[f.id].setIcon(icon);
    } else {
      leafletMarkers[f.id] = L.marker(f.latlng, { icon })
        .addTo(map)
        .on('click', () => showFragment(f.id));
    }
  });
}

function updateScore() {
  document.getElementById('score-display').textContent =
    '✦ ' + fragments.filter(f=>f.collected).length + ' / 7';
}

// ===== DETAIL PANEL =====
function showFragment(id) {
  const f = fragments.find(x=>x.id===id);
  if (!f) return;
  document.getElementById('detail-content').innerHTML = `
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:14px;">
      <div style="width:46px;height:46px;background:${f.collected?'#d0f0a8':'#e8f0d0'};border-radius:50%;
           display:flex;align-items:center;justify-content:center;border:2px solid ${f.collected?'#5a9030':'#90ae58'};
           font-size:20px;flex-shrink:0;">${f.collected?'🌿':'🌱'}</div>
      <div style="flex:1;">
        <div style="color:#2a4010;font-size:16px;font-weight:800;">${f.name}</div>
        <div style="color:#6a9840;font-size:11px;margin-top:2px;">${f.type}</div>
      </div>
      ${f.collected?'<div style="background:#d0f0a8;color:#3a6018;font-size:10px;padding:4px 10px;border-radius:12px;white-space:nowrap;font-weight:600;border:1px solid #90c860;">已收集</div>':''}
    </div>
    <div id="story-area" style="margin-bottom:14px;">
      ${f.story
        ?`<div style="color:#2d4020;font-size:13px;line-height:1.9;background:#f0f8e8;border-radius:12px;padding:12px;border-left:3px solid #7aba50;">${f.story}</div>`
        :`<div style="color:#8aaa60;font-size:13px;background:#f0f8e8;border-radius:12px;padding:12px;">这枚碎片还未被揭示……</div>`}
    </div>
    <div style="background:#e8f4d8;border-radius:12px;padding:12px;margin-bottom:16px;border:1px solid #b8d890;">
      <div style="color:#6a9840;font-size:10px;margin-bottom:5px;font-weight:600;">📍 打卡挑战</div>
      <div style="color:#2d4020;font-size:12px;line-height:1.7;">${f.challenge}</div>
    </div>
    <div style="display:flex;gap:8px;">
      ${!f.story?`<button onclick="generateStory(${id})" class="action-btn" style="flex:1;background:#4a7828;color:#e8f4d8;">🌿 AI 揭示故事</button>`:''}
      ${!f.collected?`<button onclick="collectFragment(${id})" class="action-btn" style="flex:1;background:#e8f4d8;color:#3a6018;border:1.5px solid #90c860;">收集碎片 ✦</button>`:''}
      <button onclick="closePanel()" class="action-btn" style="padding:11px 14px;background:#d8e8c0;color:#5a8030;">关闭</button>
    </div>`;
  document.getElementById('detail-panel').style.transform = 'translateY(0)';
}

async function generateStory(id) {
  const f = fragments.find(x=>x.id===id); if (!f) return;
  document.getElementById('story-area').innerHTML =
    '<div style="color:#6a9840;font-size:12px;background:#f0f8e8;border-radius:12px;padding:12px;">正在召唤城市记忆……🌿</div>';
  const btn = document.querySelector(`button[onclick="generateStory(${id})"]`);
  if (btn) btn.disabled = true;
  try {
    f.story = await callDeepSeek(
      `你是北京城市文化专家，用80字以内、充满画面感的语言介绍「${f.name}」，包含一个冷知识或历史趣闻。语气像和朋友聊天，直接讲故事，不要标题和列表。`
    );
    showFragment(id);
  } catch(e) {
    document.getElementById('story-area').innerHTML =
      `<div style="color:#c05050;font-size:12px;background:#fff0f0;border-radius:12px;padding:12px;">生成失败：${e.message}</div>`;
    if (btn) btn.disabled = false;
  }
}

function collectFragment(id) {
  const f = fragments.find(x=>x.id===id); if (!f||f.collected) return;
  f.collected = true;
  refreshMarkers(); updateScore(); renderCollectionView(); showFragment(id);
}

function closePanel() {
  document.getElementById('detail-panel').style.transform = 'translateY(100%)';
}

// ===== TABS =====
function switchTab(tab) {
  const isMap = tab === 'map';
  document.getElementById('map-view').style.display = isMap ? 'block' : 'none';
  document.getElementById('collection-view').style.display = isMap ? 'none' : 'block';
  document.getElementById('tab-map').style.color = isMap ? '#2a4010' : '#6a9848';
  document.getElementById('tab-coll').style.color = isMap ? '#6a9848' : '#2a4010';
  if (isMap) {
    closePanel();
    // Leaflet needs a size refresh when container becomes visible
    setTimeout(() => map.invalidateSize(), 50);
  } else {
    renderCollectionView();
  }
}

// ===== COLLECTION =====
function renderCollectionView() {
  const n = fragments.filter(f=>f.collected).length;
  document.getElementById('coll-subtitle').textContent =
    `已收集 ${n}/7 枚 · ${n>=3?'可以合成明信片了！':'再收集 '+(3-n)+' 枚可合成明信片'}`;
  document.getElementById('collection-grid').innerHTML = fragments.map(f=>`
    <div onclick="${f.collected?`closePanel();switchTab('map');setTimeout(()=>showFragment(${f.id}),50);`:''}"
         style="background:${f.collected?'#e0f0c8':'#d8e8c0'};border-radius:14px;padding:13px;
                border:1.5px solid ${f.collected?'#8aca60':'#b0c890'};cursor:${f.collected?'pointer':'default'};">
      <div style="font-size:20px;margin-bottom:6px;">${f.collected?'🌿':'🌱'}</div>
      <div style="color:${f.collected?'#2a4010':'#8aaa68'};font-size:12px;font-weight:700;">${f.collected?f.name:'???'}</div>
      <div style="color:${f.collected?'#5a8030':'#a0b880'};font-size:10px;margin-top:3px;">${f.collected?f.type:'未发现'}</div>
    </div>`).join('');
  document.getElementById('postcard-btn-section').style.display = n>=3?'block':'none';
}

async function generatePostcard() {
  const result = document.getElementById('postcard-result');
  const names = fragments.filter(f=>f.collected).map(f=>f.name).join('、');
  result.innerHTML = '<div style="color:#6a9840;font-size:12px;text-align:center;padding:18px;">正在书写你的北京明信片……</div>';
  try {
    const text = await callDeepSeek(
      `我探索了北京的${names}。请用明信片风格写一段80字以内的感悟，像写给远方朋友的寄语，有诗意但接地气，最后一句给出"我的北京标签"（4个字以内）。`
    );
    result.innerHTML = `
      <div style="background:#e8f4d8;border-radius:16px;padding:18px;border:1.5px solid #90c860;">
        <div style="color:#7aba50;font-size:9px;letter-spacing:3px;margin-bottom:12px;text-align:center;">POST CARD · BEIJING 🌿</div>
        <div style="color:#2d4020;font-size:12px;line-height:2;">${text}</div>
        <div style="margin-top:14px;border-top:1px solid #b8d890;padding-top:10px;color:#7aa050;font-size:9px;">探索足迹：${names}</div>
      </div>`;
  } catch(e) {
    result.innerHTML = `<div style="color:#c05050;font-size:12px;">生成失败：${e.message}</div>`;
  }
}

// ===== INIT =====
refreshMarkers();
updateScore();
renderCollectionView();
</script>

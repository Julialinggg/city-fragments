<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>城市碎片 · 北京</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #060a10;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
      padding: 24px 12px;
      font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
    }
    #game {
      width: 390px; max-width: 100%; background: #0d1117;
      border-radius: 20px; overflow: hidden; border: 0.5px solid #2d3748;
      display: flex; flex-direction: column; height: 680px; position: relative;
    }
    .tab-btn { background: none; border: none; cursor: pointer; transition: color 0.2s; }
    @keyframes fragPulse {
      0%, 100% { r: 14; opacity: 0.18; }
      50%       { r: 19; opacity: 0.06; }
    }
    .pulse-ring { animation: fragPulse 2.2s ease-in-out infinite; }
    #detail-panel { transition: transform 0.35s cubic-bezier(0.16, 1, 0.3, 1); }
    .action-btn {
      transition: opacity 0.2s; cursor: pointer; border: none;
      border-radius: 9px; font-size: 12px; font-weight: 500;
      padding: 11px; font-family: inherit;
    }
    .action-btn:hover { opacity: 0.85; }
    .action-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #2d3748; border-radius: 2px; }
  </style>
</head>
<body>
<div id="game">
  <div style="padding:13px 18px;background:#0d1117;border-bottom:0.5px solid #1f2937;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;">
    <div>
      <div style="color:#f59e0b;font-size:16px;font-weight:600;letter-spacing:1px;">城市碎片</div>
      <div style="color:#4b5563;font-size:11px;margin-top:1px;">北京 · 胡同探索计划</div>
    </div>
    <div style="text-align:right;">
      <div id="score-display" style="color:#e5e7eb;font-size:13px;font-weight:500;">✦ 0 / 7</div>
      <div style="color:#4b5563;font-size:10px;margin-top:1px;">碎片已收集</div>
    </div>
  </div>
  <div style="flex:1;position:relative;overflow:hidden;">
    <div id="map-view" style="height:100%;position:relative;">
      <svg viewBox="0 0 390 520" width="100%" height="100%" preserveAspectRatio="xMidYMid slice" style="display:block;">
        <rect width="390" height="520" fill="#0d1117"/>
        <g fill="#111827">
          <rect x="10" y="10" width="55" height="55"/><rect x="75" y="10" width="70" height="55"/>
          <rect x="155" y="10" width="90" height="55"/><rect x="255" y="10" width="75" height="55"/><rect x="340" y="10" width="40" height="55"/>
          <rect x="10" y="75" width="55" height="70"/><rect x="75" y="75" width="70" height="70"/>
          <rect x="155" y="75" width="90" height="70"/><rect x="255" y="75" width="75" height="70"/><rect x="340" y="75" width="40" height="70"/>
          <rect x="10" y="155" width="55" height="70"/><rect x="75" y="155" width="70" height="70"/>
          <rect x="155" y="155" width="90" height="70"/><rect x="255" y="155" width="75" height="70"/><rect x="340" y="155" width="40" height="70"/>
          <rect x="10" y="235" width="55" height="95"/><rect x="75" y="235" width="70" height="95"/>
          <rect x="155" y="235" width="90" height="95"/><rect x="255" y="235" width="75" height="95"/><rect x="340" y="235" width="40" height="95"/>
          <rect x="10" y="340" width="55" height="80"/><rect x="75" y="340" width="70" height="80"/>
          <rect x="155" y="340" width="90" height="80"/><rect x="255" y="340" width="75" height="80"/><rect x="340" y="340" width="40" height="80"/>
          <rect x="10" y="430" width="55" height="80"/><rect x="75" y="430" width="70" height="80"/>
          <rect x="155" y="430" width="90" height="80"/><rect x="255" y="430" width="75" height="80"/><rect x="340" y="430" width="40" height="80"/>
        </g>
        <ellipse cx="42" cy="118" rx="30" ry="22" fill="#0a2030"/>
        <text x="42" y="121" text-anchor="middle" fill="#1e4060" font-size="8">什刹海</text>
        <rect x="10" y="248" width="55" height="72" rx="3" fill="#0d2218"/>
        <ellipse cx="37" cy="282" rx="16" ry="10" fill="#0a2030"/>
        <text x="37" y="278" text-anchor="middle" fill="#1a4228" font-size="8">北海</text>
        <rect x="100" y="362" width="178" height="108" rx="3" fill="#18130a"/>
        <rect x="113" y="374" width="152" height="84" rx="2" fill="#1e1708"/>
        <text x="189" y="422" text-anchor="middle" fill="#3d2e0a" font-size="10" font-weight="500">故　宫</text>
        <line x1="0" y1="70" x2="390" y2="70" stroke="#7c3209" stroke-width="4"/>
        <line x1="0" y1="150" x2="390" y2="150" stroke="#7c3209" stroke-width="4"/>
        <line x1="0" y1="230" x2="390" y2="230" stroke="#7c3209" stroke-width="4"/>
        <line x1="0" y1="335" x2="390" y2="335" stroke="#9a3e0c" stroke-width="5"/>
        <line x1="0" y1="425" x2="390" y2="425" stroke="#7c3209" stroke-width="4"/>
        <line x1="70" y1="0" x2="70" y2="520" stroke="#7c3209" stroke-width="4"/>
        <line x1="150" y1="0" x2="150" y2="520" stroke="#7c3209" stroke-width="4"/>
        <line x1="250" y1="0" x2="250" y2="520" stroke="#7c3209" stroke-width="4"/>
        <line x1="335" y1="0" x2="335" y2="520" stroke="#7c3209" stroke-width="3"/>
        <g stroke="#1e2a3a" stroke-width="1" stroke-dasharray="3 5">
          <line x1="0" y1="38" x2="390" y2="38"/><line x1="0" y1="105" x2="390" y2="105"/>
          <line x1="0" y1="122" x2="390" y2="122"/><line x1="0" y1="185" x2="390" y2="185"/>
          <line x1="0" y1="205" x2="390" y2="205"/><line x1="0" y1="268" x2="390" y2="268"/>
          <line x1="0" y1="295" x2="390" y2="295"/><line x1="0" y1="370" x2="390" y2="370"/>
          <line x1="0" y1="398" x2="390" y2="398"/><line x1="0" y1="460" x2="390" y2="460"/>
          <line x1="38" y1="0" x2="38" y2="520"/><line x1="108" y1="0" x2="108" y2="520"/>
          <line x1="128" y1="0" x2="128" y2="520"/><line x1="193" y1="0" x2="193" y2="520"/>
          <line x1="212" y1="0" x2="212" y2="520"/><line x1="290" y1="0" x2="290" y2="520"/>
          <line x1="315" y1="0" x2="315" y2="520"/>
        </g>
        <text x="172" y="66" fill="#5a2e08" font-size="8">鼓楼东大街</text>
        <text x="172" y="146" fill="#5a2e08" font-size="8">地安门东大街</text>
        <text x="185" y="226" fill="#5a2e08" font-size="8">平安大道</text>
        <text x="8" y="330" fill="#6a3410" font-size="8">长安街</text>
        <text x="72" y="22" fill="#5a2e08" font-size="8" transform="rotate(90 72 22)">南锣鼓巷</text>
        <text x="152" y="22" fill="#5a2e08" font-size="8" transform="rotate(90 152 22)">东四北大街</text>
        <circle cx="110" cy="190" r="4" fill="#3b82f6" opacity="0.9"/>
        <circle cx="110" cy="190" r="8" fill="none" stroke="#3b82f6" stroke-width="1" opacity="0.4"/>
        <text x="120" y="186" fill="#60a5fa" font-size="8">你在这里</text>
        <g transform="translate(362,26)">
          <circle r="13" fill="#141c26" stroke="#2d3748" stroke-width="0.5"/>
          <text y="-4" text-anchor="middle" fill="#f59e0b" font-size="8" font-weight="600">N</text>
          <text y="9" text-anchor="middle" fill="#374151" font-size="7">S</text>
          <text x="-7" y="3" text-anchor="middle" fill="#374151" font-size="7">W</text>
          <text x="7" y="3" text-anchor="middle" fill="#374151" font-size="7">E</text>
        </g>
        <g id="fragments-layer"></g>
      </svg>
    </div>
    <div id="collection-view" style="display:none;height:100%;overflow-y:auto;padding:16px;background:#0d1117;">
      <div style="margin-bottom:14px;">
        <div style="color:#e5e7eb;font-size:15px;font-weight:500;margin-bottom:3px;">我的收藏册</div>
        <div id="coll-subtitle" style="color:#4b5563;font-size:12px;">收集 3 枚碎片可合成专属明信片</div>
      </div>
      <div id="collection-grid" style="display:grid;grid-template-columns:1fr 1fr;gap:9px;"></div>
      <div id="postcard-btn-section" style="margin-top:14px;display:none;">
        <button onclick="generatePostcard()" class="action-btn" style="width:100%;background:#7c3209;color:#fde68a;">✦ 合成我的北京明信片</button>
      </div>
      <div id="postcard-result" style="margin-top:10px;"></div>
    </div>
    <div id="detail-panel" style="position:absolute;bottom:0;left:0;right:0;background:#111827;border-top:0.5px solid #2d3748;border-radius:16px 16px 0 0;padding:18px;transform:translateY(100%);z-index:20;max-height:78%;overflow-y:auto;">
      <div style="width:30px;height:3px;background:#374151;border-radius:2px;margin:0 auto 14px;"></div>
      <div id="detail-content"></div>
    </div>
  </div>
  <div style="height:58px;background:#0d1117;border-top:0.5px solid #1f2937;display:flex;align-items:stretch;flex-shrink:0;">
    <button class="tab-btn" id="tab-map" onclick="switchTab('map')" style="flex:1;color:#f59e0b;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;font-size:10px;font-family:inherit;">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 7l6-3 6 3 6-3v13l-6 3-6-3-6 3V7z"/><line x1="9" y1="4" x2="9" y2="17"/><line x1="15" y1="7" x2="15" y2="20"/></svg>
      探索地图
    </button>
    <button class="tab-btn" id="tab-coll" onclick="switchTab('collection')" style="flex:1;color:#4b5563;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;font-size:10px;font-family:inherit;">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
      收藏册
    </button>
  </div>
</div>

<script>
// ✅ 第一步：替换为你的 DeepSeek API Key
// 获取地址：https://platform.deepseek.com → API Keys → Create


const fragments = [
  { id:1, x:150, y:38,  name:"鼓楼",      type:"历史地标", challenge:"找到鼓楼飞檐的最美角度，拍下那四角翘起的弧线",      collected:false, story:null },
  { id:2, x:40,  y:108, name:"什刹海",    type:"湖畔风情", challenge:"在荷花市场附近，捕捉水面倒映的灰瓦与红墙",          collected:false, story:null },
  { id:3, x:70,  y:200, name:"南锣鼓巷",  type:"胡同文化", challenge:"找一扇挂着旧门牌号的四合院木门并拍下来",             collected:false, story:null },
  { id:4, x:295, y:105, name:"雍和宫",    type:"藏传佛教", challenge:"在香烟缭绕中拍下金顶与蓝天的强烈对比",              collected:false, story:null },
  { id:5, x:37,  y:272, name:"北海公园",  type:"皇家园林", challenge:"在五龙亭附近找到白塔倒影最完整的拍摄点",             collected:false, story:null },
  { id:6, x:189, y:415, name:"故宫角楼",  type:"皇城遗迹", challenge:"从护城河东南角，拍出三重屋檐叠层的角楼剪影",         collected:false, story:null },
  { id:7, x:260, y:192, name:"五道营胡同", type:"文艺街区", challenge:"找到最有年代感的一块手写木招牌留影",                 collected:false, story:null }
];

async function callDeepSeek(prompt) {
  const res = await fetch("/api/story", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ prompt })
  });
  const data = await res.json();
  return data.text || "生成失败，请重试。";
}

function renderFragments() {
  const layer = document.getElementById('fragments-layer');
  layer.innerHTML = '';
  const ns = 'http://www.w3.org/2000/svg';
  fragments.forEach(f => {
    const g = document.createElementNS(ns, 'g');
    g.style.cursor = 'pointer';
    g.addEventListener('click', () => showFragment(f.id));
    if (!f.collected) {
      const ring = document.createElementNS(ns, 'circle');
      ring.setAttribute('cx', f.x); ring.setAttribute('cy', f.y); ring.setAttribute('r', '14');
      ring.setAttribute('fill', '#f59e0b'); ring.setAttribute('class', 'pulse-ring');
      ring.style.animationDelay = (f.id * 0.28) + 's';
      g.appendChild(ring);
    }
    const col = f.collected ? '#10b981' : '#d97706';
    const c = document.createElementNS(ns, 'circle');
    c.setAttribute('cx', f.x); c.setAttribute('cy', f.y); c.setAttribute('r', '9'); c.setAttribute('fill', col);
    g.appendChild(c);
    const d = document.createElementNS(ns, 'circle');
    d.setAttribute('cx', f.x); d.setAttribute('cy', f.y); d.setAttribute('r', '3');
    d.setAttribute('fill', f.collected ? '#064e3b' : '#7c2d12');
    g.appendChild(d);
    const t = document.createElementNS(ns, 'text');
    t.setAttribute('x', f.x); t.setAttribute('y', f.y + 20); t.setAttribute('text-anchor', 'middle');
    t.setAttribute('fill', f.collected ? '#34d399' : '#fbbf24'); t.setAttribute('font-size', '9');
    t.textContent = f.name;
    g.appendChild(t);
    layer.appendChild(g);
  });
}

function updateScore() {
  document.getElementById('score-display').textContent = '✦ ' + fragments.filter(f => f.collected).length + ' / 7';
}

function showFragment(id) {
  const f = fragments.find(x => x.id === id);
  if (!f) return;
  document.getElementById('detail-content').innerHTML = `
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:14px;">
      <div style="width:42px;height:42px;background:${f.collected?'#064e3b':'#431407'};border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;color:${f.collected?'#34d399':'#f59e0b'};">${f.collected?'✦':'?'}</div>
      <div style="flex:1;">
        <div style="color:#e5e7eb;font-size:15px;font-weight:500;">${f.name}</div>
        <div style="color:#6b7280;font-size:11px;margin-top:2px;">${f.type}</div>
      </div>
      ${f.collected ? '<div style="background:#064e3b;color:#34d399;font-size:10px;padding:3px 8px;border-radius:5px;white-space:nowrap;">已收集</div>' : ''}
    </div>
    <div id="story-area" style="margin-bottom:14px;">
      ${f.story
        ? `<div style="color:#d1d5db;font-size:13px;line-height:1.85;border-left:2px solid #f59e0b;padding-left:10px;">${f.story}</div>`
        : `<div style="color:#374151;font-size:13px;font-style:italic;">这枚碎片还未被揭示……</div>`}
    </div>
    <div style="background:#1c2533;border-radius:9px;padding:11px;margin-bottom:14px;">
      <div style="color:#6b7280;font-size:10px;margin-bottom:5px;">打卡挑战</div>
      <div style="color:#d1d5db;font-size:12px;line-height:1.6;">${f.challenge}</div>
    </div>
    <div style="display:flex;gap:8px;">
      ${!f.story ? `<button onclick="generateStory(${id})" class="action-btn" style="flex:1;background:#7c3209;color:#fde68a;">AI 揭示故事</button>` : ''}
      ${!f.collected ? `<button onclick="collectFragment(${id})" class="action-btn" style="flex:1;background:#064e3b;color:#34d399;">收集碎片 ✦</button>` : ''}
      <button onclick="closePanel()" class="action-btn" style="padding:11px 14px;background:#1f2937;color:#6b7280;">关闭</button>
    </div>`;
  document.getElementById('detail-panel').style.transform = 'translateY(0)';
}

async function generateStory(id) {
  const f = fragments.find(x => x.id === id);
  if (!f) return;
  document.getElementById('story-area').innerHTML = '<div style="color:#6b7280;font-size:12px;padding:6px 0;">正在召唤城市记忆……</div>';
  const btn = document.querySelector(`button[onclick="generateStory(${id})"]`);
  if (btn) btn.disabled = true;
  try {
    f.story = await callDeepSeek(`你是北京城市文化专家，用80字以内、充满画面感的语言介绍「${f.name}」，包含一个冷知识或历史趣闻。语气像和朋友聊天，直接讲故事，不要标题和列表。`);
    showFragment(id);
  } catch(e) {
    document.getElementById('story-area').innerHTML = '<div style="color:#ef4444;font-size:12px;">网络异常，请重试</div>';
  }
}

function collectFragment(id) {
  const f = fragments.find(x => x.id === id);
  if (!f || f.collected) return;
  f.collected = true;
  renderFragments(); updateScore(); renderCollectionView(); showFragment(id);
}

function closePanel() {
  document.getElementById('detail-panel').style.transform = 'translateY(100%)';
}

function switchTab(tab) {
  const isMap = tab === 'map';
  document.getElementById('map-view').style.display = isMap ? 'block' : 'none';
  document.getElementById('collection-view').style.display = isMap ? 'none' : 'block';
  document.getElementById('tab-map').style.color = isMap ? '#f59e0b' : '#4b5563';
  document.getElementById('tab-coll').style.color = isMap ? '#4b5563' : '#f59e0b';
  if (isMap) closePanel(); else renderCollectionView();
}

function renderCollectionView() {
  const n = fragments.filter(f => f.collected).length;
  document.getElementById('coll-subtitle').textContent = `已收集 ${n}/7 枚 · ${n >= 3 ? '可以合成明信片了！' : '再收集 ' + (3-n) + ' 枚可合成明信片'}`;
  document.getElementById('collection-grid').innerHTML = fragments.map(f => `
    <div onclick="${f.collected ? `closePanel();switchTab('map');setTimeout(()=>showFragment(${f.id}),50);` : ''}"
         style="background:${f.collected?'#141c2c':'#0d1117'};border-radius:10px;padding:11px;border:0.5px solid ${f.collected?'#2d3f5a':'#1f2937'};cursor:${f.collected?'pointer':'default'};">
      <div style="font-size:16px;margin-bottom:7px;color:${f.collected?'#f59e0b':'#374151'};">${f.collected?'✦':'○'}</div>
      <div style="color:${f.collected?'#e5e7eb':'#374151'};font-size:12px;font-weight:500;">${f.collected?f.name:'???'}</div>
      <div style="color:${f.collected?'#4b5563':'#1f2937'};font-size:10px;margin-top:3px;">${f.collected?f.type:'未发现'}</div>
    </div>`).join('');
  document.getElementById('postcard-btn-section').style.display = n >= 3 ? 'block' : 'none';
}

async function generatePostcard() {
  const result = document.getElementById('postcard-result');
  const names = fragments.filter(f => f.collected).map(f => f.name).join('、');
  result.innerHTML = '<div style="color:#6b7280;font-size:12px;text-align:center;padding:18px;">正在生成你的北京明信片……</div>';
  try {
    const text = await callDeepSeek(`我探索了北京的${names}。请用明信片风格写一段80字以内的感悟，像写给远方朋友的寄语，有诗意但接地气，最后一句给出"我的北京标签"（4个字以内）。`);
    result.innerHTML = `
      <div style="background:#110e05;border-radius:11px;padding:18px;border:0.5px solid #7c3209;">
        <div style="color:#4b5563;font-size:9px;letter-spacing:3px;margin-bottom:11px;">POST CARD · BEIJING</div>
        <div style="color:#fde68a;font-size:12px;line-height:1.95;">${text}</div>
        <div style="margin-top:14px;border-top:0.5px solid #2d1a06;padding-top:10px;color:#4b5563;font-size:9px;">探索足迹：${names}</div>
      </div>`;
  } catch(e) {
    result.innerHTML = '<div style="color:#ef4444;font-size:12px;">生成失败，请重试</div>';
  }
}

renderFragments(); updateScore(); renderCollectionView();
</script>
</body>
</html>
